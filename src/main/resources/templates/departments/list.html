<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Departments list</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<style>
    .navbar {
        background-color: #d9edf7;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .error-text {
        color: #a94442;
        margin-top: 5px;
        font-size: 13px;
    }
    .alert-custom {
        margin-top: 15px;
    }
</style>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Home</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>

<div class="container">

    <div class="row">
        <div class="col-md-12">

            <div class="panel panel-primary">
                <div class="panel-heading">
                    <h3 class="panel-title">Departments list</h3>
                </div>

                <div class="panel-body">

                    <div class="row" style="margin-bottom: 15px;">
                        <div class="col-md-6">
                            <a th:href="@{/departments/create}" class="btn btn-success">
                                <span class="glyphicon glyphicon-plus"></span>
                                Add new department
                            </a>
                        </div>
                        <div class="col-md-6 text-right">
                            <a th:href="@{/home}" class="btn btn-default">
                                <span class="glyphicon glyphicon-home"></span>
                                Back
                            </a>
                        </div>
                    </div>

                    <table class="table table-bordered table-hover table-striped">
                        <thead>
                        <tr class="info">
                            <th style="width: 80px;" class="text-center">No.</th>
                            <th>Department name</th>
                            <th>Description</th>
                            <th style="width: 180px;" class="text-center">Action</th>
                        </tr>
                        </thead>

                        <tbody>
                        <tr th:each="department, iterStat : ${departments}">
                            <td class="text-center" th:text="${iterStat.count}"></td>

                            <td th:text="${department.name}"></td>

                            <td th:text="${department.description}"></td>

                            <td class="text-center">
                                <a th:href="@{/departments/edit/{id}(id=${department.id})}"
                                   class="btn btn-warning btn-sm">
                                    <span class="glyphicon glyphicon-pencil"></span>
                                    Edit
                                </a>

                                <a th:href="@{/departments/delete/{id}(id=${department.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Are you sure you want to delete this department?')">
                                    <span class="glyphicon glyphicon-trash"></span>
                                    Delete
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(departments)}">
                            <td colspan="4" class="text-center text-muted">
                                No departments
                            </td>
                        </tr>
                        </tbody>
                    </table>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
