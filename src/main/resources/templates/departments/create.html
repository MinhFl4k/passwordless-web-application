<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add new department</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>
<style>
    .navbar {
        background-color: #d9edf7;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .error-text {
        color: #a94442;
        margin-top: 5px;
        font-size: 13px;
    }
    .alert-custom {
        margin-top: 15px;
    }
</style>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Home</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>

<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <h1>Add new department</h1>

            <form action="#" th:action="@{/departments/create}" th:object="${department}" method="post">
                <div class="form-group">
                    <label class="control-label" for="name">
                        Name:
                    </label>
                    <input id="name" class="form-control"
                           th:field="*{name}"
                           autofocus="autofocus" />
                    <p class="error-text"
                       th:if="${#fields.hasErrors('name')}"
                       th:errors="*{name}"></p>
                </div>
                <div class="form-group">
                    <label class="control-label" for="description"> Description
                    </label> <input id="description" class="form-control"
                                    th:field="*{description}" autofocus="autofocus"/>
                    <p class="error-text"
                       th:if="${#fields.hasErrors('description')}"
                       th:errors="*{email}"></p>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">
                        Add new department
                    </button>
                    <a th:href="@{/departments/list}" class="btn btn-danger">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
