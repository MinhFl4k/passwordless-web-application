<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add passkey</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <script th:src="@{/js/signup-passkey.js}"></script>
</head>
<style>
    .navbar {
        background-color: #d9edf7;
    }
    .anchor{
        margin: 6px;
        background-color: #d9edf7;
        border-color: #d9edf7;
    }

    input, label {
        display:block;
    }
</style>
<body>

<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Add passkey</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>
<div class="container">
    <div class="row">
        <h1>Passkey management</h1>

        <div class="form-group">
            <label for="passkeyLabel">Passkey name</label>
            <input type="text"
                   id="passkeyLabel"
                   class="form-control"
                   placeholder="Enter passkey name">
        </div>

        <button
                type="button"
                onclick="registerPasskey()"
                class="btn btn-primary">Add passkey</button>
        <a th:href="@{/login}" class="btn btn-danger">Back</a>
        <p id="passkey-message"></p>

        <hr>

        <div class="container mt-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-3">List passkeys</h4>

                    <div class="table-responsive" th:if="${!#lists.isEmpty(passkeys)}">
                        <table class="table table-bordered table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>Label</th>
                                <th>Created</th>
                                <th>Last used</th>
                                <th></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="p : ${passkeys}">
                                <td th:text="${p.label}"></td>
                                <td th:text="${p.created}"></td>
                                <td th:text="${p.lastUsed}"></td>
                                <td>
                                    <form th:action="@{/passkeys/delete}" method="post" class="d-inline">
                                        <input type="hidden" name="credentialId" th:value="${p.credentialId}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                    </form>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div th:if="${#lists.isEmpty(passkeys)}" class="alert alert-secondary mb-0">
                        You don’t have any passkeys yet.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
