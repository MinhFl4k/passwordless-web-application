<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script th:src="@{/js/auth.js}"></script>
</head>
<style>
    .navbar {
        background-color: #d9edf7;
    }
</style>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Home</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>

<div class="container">
    <h1>Send a login link</h1>

    <form th:action="@{/auth/send-login-token}" th:object="${emailReq}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="text" th:field="*{email}" class="form-control">
        </div>
        <div th:if="${successMessage}" class="alert alert-success">
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${#fields.hasErrors('email')}" class="text-danger">
            <span th:errors="*{email}"></span>
        </div>
        <button type="submit" class="btn btn-primary" id="sendAuthBtn">Send link to email</button>
        <a href="/" th:href="@{/login}" class="btn btn-danger">Back</a>
    </form>
    <hr>
</div>
</body>
</html>
