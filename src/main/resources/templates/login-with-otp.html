<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script th:src="@{/js/auth.js}"></script>
</head>
<style>
    .navbar {
        background-color: #d9edf7;
    }
</style>
<body>
<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Home</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>

<div class="container">
    <h1>Enter the code sent to your email</h1>

    <form th:action="@{/send-otp}" th:object="${emailReq}" method="post">
        <div class="form-group">
            <label>Email</label>
            <input type="text" name="email" class="form-control">
            <div th:if="${#fields.hasErrors('email')}" class="text-danger">
                <span th:errors="*{email}"></span>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" id="sendAuthBtn">Send OTP</button>
    </form>

    <hr>

    <div th:if="${message}" class="alert alert-success">
        <span th:text="${message}"></span>
    </div>

    <form th:action="@{/otp-login-process}" method="post">

        <div class="form-group">
            <label>Login code</label>
            <input type="number" name="otp" class="form-control">
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <span th:text="${error}"></span>
        </div>

        <button type="submit" class="btn btn-success">Login</button>
        <a href="/" th:href="@{/login}" class="btn btn-danger">Back</a>
    </form>

    <hr>
</div>
</body>
</html>
