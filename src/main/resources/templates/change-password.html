<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Change password</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
</head>

<style>
    .navbar {
        background-color: #d9edf7;
    }
    .anchor{
        margin: 6px;
        background-color: #d9edf7;
        border-color: #d9edf7;
    }

    input, label {
        display:block;
    }

    .form-group {
        margin-bottom: 20px;
    }
    .error-text {
        color: #a94442;
        margin-top: 5px;
        font-size: 13px;
    }
    .alert-custom {
        margin-top: 15px;
    }
</style>

<body>

<nav class="navbar navbar-inverse navbar-fixed-top">
    <div class="container">
        <div class="navbar-header">
            <h2>Change password</h2>
        </div>
    </div>
</nav>

<br><br><br><br><br><br><br>

<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">
            <form th:action="@{/change-password}" th:object="${passwordDto}" method="post">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" class="form-control" th:field="*{currentPassword}" />
                    <p class="error-text" th:errors="*{currentPassword}"></p>
                </div>

                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" class="form-control" th:field="*{newPassword}" />
                    <p class="error-text" th:errors="*{newPassword}"></p>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" class="form-control" th:field="*{confirmPassword}" />
                    <p class="error-text" th:errors="*{confirmPassword}"></p>
                </div>

                <button type="submit" class="btn btn-primary">Change Password</button>
                <a th:href="@{/home}" class="btn btn-default">Cancel</a>
            </form>
        </div>
    </div>
</div>

<script>
    window.addEventListener("pageshow", function (event) {
        if (event.persisted || performance.getEntriesByType("navigation")[0].type === "back_forward") {
            window.location.reload();
        }
    });
</script>

</body>
</html>
